name: Release new action version
on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      TAG_NAME:
        description: 'Tag name that the major tag will point to'
        required: true

env:
  TAG_NAME: ${{ github.event.inputs.TAG_NAME || github.event.release.tag_name }}
# TODO(supply-chain): Human review before hardening: this release workflow updates
# tags with contents:write; verify environment protections, token scope, and
# whether publish-action should be pinned to a full commit SHA.
permissions:
  contents: write

jobs:
  update_tag:
    name: Update the major tag to include the ${{ github.event.inputs.TAG_NAME || github.event.release.tag_name }} changes
    environment:
      name: releaseNewActionVersion
    runs-on: ubuntu-latest
    steps:
    - name: Update the ${{ env.TAG_NAME }} tag
      uses: actions/publish-action@v0.2.1
      with:
        source-tag: ${{ env.TAG_NAME }}
